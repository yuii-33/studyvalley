<!DOCTYPE html>
<!-- ══════════════════════════════════════════════════════════
     posn/set.html — เอนจินทำโจทย์
     อ่านชุดจาก ../data/posn/<id>.json (ระบุด้วย ?id=<id>)
     ไม่มี ?id → โชว์รายการชุดจาก index.json ให้เลือก
     ══════════════════════════════════════════════════════════ -->
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ทำโจทย์ • Study Valley</title>
<meta name="theme-color" content="#F1D486">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Study Valley">
<link rel="stylesheet" href="../assets/app.css">
<link rel="stylesheet" href="../assets/set.css">
</head>
<body>
<div class="wrap">
<div class="panel">

  <div class="setbar">
    <a class="backlink" id="homelink" href="../index.html">หน้าแรก</a>
    <div class="settitle" id="settitle">Study Valley</div>
    <div class="timer" id="timer" style="display:none">0:00</div>
  </div>

  <div id="picker" style="display:none"></div>

  <div id="quiz" style="display:none">

    <div class="qprog"><i id="qprogfill"></i></div>
    <div class="qmeta">
      <span id="qcount"></span>
      <button class="pausebtn" id="pauseBtn">พักเบรคชั่วคราว</button>
      <span id="qtarget"></span>
    </div>

    <div class="card qcard">
      <div class="badges" id="badges"></div>
      <div class="qbody" id="qbody"></div>
      <button class="hintbtn" id="hintbtn" style="display:none"></button>
      <div class="trbox" id="trbox" style="display:none"></div>
    </div>

    <div class="choices" id="choices"></div>
    <div id="fillwrap" style="display:none">
      <input class="field fillin" id="fillin" placeholder="พิมพ์คำตอบ" autocomplete="off">
    </div>

    <div class="actions">
      <button class="btn primary" id="btnReveal">เฉลย</button>
    </div>

    <div class="exbox" id="exbox" style="display:none">
      <div class="exhead" id="exhead"></div>
      <div class="excontent" id="excontent"></div>
    </div>

    <div class="nav">
      <button class="btn soft" id="btnPrev">ก่อนหน้า</button>
      <button class="btn primary" id="btnNext">ถัดไป</button>
    </div>

  </div>

  <div id="summary" style="display:none"></div>

</div>
</div>

<div class="pausecover" id="pauseCover" style="display:none">
  <div class="pausebox">
    <div class="pausemsg">พักเบรคอยู่ • เวลาไม่เดิน</div>
    <button class="btn primary" id="resumeBtn">ทำต่อ</button>
    <a class="btn soft" href="../index.html" id="pauseHome">ออกไปหน้าแรก</a>
  </div>
</div>
<script src="../assets/art.js"></script>
<script src="../assets/xp.js"></script>
<script src="../assets/set.js"></script>
</body>
</html>
