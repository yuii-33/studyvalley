<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="cov" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#74B552"/><stop offset="1" stop-color="#4E8B37"/>
    </linearGradient>
  </defs>

  <!-- พื้นครีม + วงกลมนุ่ม ๆ -->
  <rect width="512" height="512" fill="#F3E7C7"/>
  <circle cx="70" cy="150" r="150" fill="#F8F0D8" opacity="0.55"/>
  <circle cx="470" cy="120" r="120" fill="#F8F0D8" opacity="0.5"/>
  <circle cx="120" cy="470" r="150" fill="#ECDFBB" opacity="0.5"/>
  <circle cx="440" cy="430" r="120" fill="#F8F0D8" opacity="0.5"/>

  <!-- หนังสือเขียว -->
  <g transform="rotate(-5 256 288)">
    <!-- หน้ากระดาษ (ขอบขวามีเส้น) -->
    <rect x="188" y="150" width="180" height="268" rx="12" fill="#FFFFFF" stroke="#E3DAC8" stroke-width="2"/>
    <g stroke="#E0D6C0" stroke-width="2">
      <path d="M350 176 h20 M350 198 h20 M350 220 h20 M350 242 h20 M350 264 h20 M350 286 h20 M350 308 h20 M350 330 h20 M350 352 h20 M350 374 h20 M350 396 h20"/>
    </g>
    <!-- ปกเขียว -->
    <rect x="160" y="140" width="196" height="268" rx="13" fill="url(#cov)" stroke="#3E7A2C" stroke-width="4"/>
    <!-- สันปก -->
    <path d="M174 140 h18 v268 h-18 a14 14 0 0 1-14-14 V154 a14 14 0 0 1 14-14 z" fill="#3E7A2C"/>
    <!-- ไฮไลต์ทแยง -->
    <path d="M200 150 L230 150 L188 398 L170 360 Z" fill="#FFFFFF" opacity="0.12"/>
    <!-- กรอบในปก -->
    <rect x="210" y="170" width="128" height="208" rx="8" fill="none" stroke="#8FCB6E" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- ที่คั่นหนังสือ ทอง -->
  <g transform="rotate(-5 256 288)">
    <path d="M250 140 h44 v118 l-22 -18 -22 18 z" fill="#E9B84B" stroke="#CE9A2E" stroke-width="3" stroke-linejoin="round"/>
    <path d="M272 140 v100" stroke="#CE9A2E" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- ชื่อแอป สองสี บรรทัดเดียว -->
  <text x="256" y="474" text-anchor="middle" font-family="'Arial Rounded MT Bold','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="58" letter-spacing="0.5">
    <tspan fill="#4A3A2E">Study </tspan><tspan fill="#E0A32E">Valley</tspan>
  </text>
</svg>
